<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffe3c2">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>菜品管理 - 家庭点餐</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="hero" style="border-radius:0 0 20px 20px; padding:18px 20px 22px;">
  <div class="hero-title"><span>菜品管理 🧑‍🍳</span></div>
</div>
<div class="content">
  <div class="card">
    <div class="image-upload-row">
      <img class="image-upload-preview" id="imagePreview" style="display:none;">
      <div class="dish-row-photo-placeholder image-upload-preview" id="imagePlaceholder">📷</div>
      <div>
        <input type="file" id="imageInput" accept="image/*" style="display:none;">
        <button class="btn btn-secondary" id="chooseImageBtn" type="button">选择照片</button>
      </div>
    </div>
    <input type="text" id="nameInput" placeholder="菜名，如「番茄炒蛋」">
    <select id="categorySelect"></select>
    <input type="text" id="descInput" placeholder="配料说明，如「番茄2个・鸡蛋3个」（可不填）">
    <div style="display:flex; gap:10px;">
      <button class="btn btn-primary" id="saveBtn" style="flex:1;">添加菜品</button>
      <button class="btn btn-secondary" id="cancelBtn" style="display:none;">取消编辑</button>
    </div>
  </div>

  <div id="list"></div>
</div>

<div class="tabbar">
  <a href="index.html"><span class="tab-icon">🍚</span>点餐</a>
  <a href="orders.html"><span class="tab-icon">📋</span>订单</a>
  <a href="admin.html" class="active"><span class="tab-icon">🧑‍🍳</span>菜品管理</a>
</div>

<script>
let categories = [];
let editingId = null;
let pendingImage = '';

async function loadCategories() {
  const res = await fetch('/api/categories');
  const data = await res.json();
  categories = data.categories;
  const select = document.getElementById('categorySelect');
  select.innerHTML = categories.map((c) => `<option value="${c.key}">${c.emoji} ${c.key}</option>`).join('');
}

async function load() {
  const res = await fetch('/api/dishes?all=true');
  const data = await res.json();
  render(data.dishes);
}

function categoryEmoji(key) {
  const cat = categories.find((c) => c.key === key);
  return cat ? cat.emoji : '🍽️';
}

function render(dishes) {
  const list = document.getElementById('list');
  if (dishes.length === 0) {
    list.innerHTML = '<div class="empty-tip">还没有菜品<br><button class="btn btn-primary" style="margin-top:12px" onclick="seed()">一键添加示例菜品</button></div>';
    return;
  }
  list.innerHTML = dishes.map((d) => `
    <div class="card dish-row ${d.available ? '' : 'unavailable'}">
      ${d.image
        ? `<img class="dish-row-photo" src="${d.image}">`
        : `<div class="dish-row-photo-placeholder">${categoryEmoji(d.category)}</div>`}
      <div class="dish-row-main">
        <div class="dish-name">${d.name}</div>
        <div class="dish-category">${d.category || '未分类'}${d.available ? '' : ' · 已下架'}</div>
      </div>
      <div class="dish-actions">
        <button class="edit-btn" onclick='editDish(${JSON.stringify(d)})'>编辑</button>
        ${d.available ? `<button class="delete-btn" onclick="removeDish(${d.id})">下架</button>` : ''}
      </div>
    </div>
  `).join('');
}

function editDish(dish) {
  editingId = dish.id;
  pendingImage = dish.image || '';
  document.getElementById('nameInput').value = dish.name;
  document.getElementById('categorySelect').value = dish.category || categories[0].key;
  document.getElementById('descInput').value = dish.desc || '';
  document.getElementById('saveBtn').textContent = '保存修改';
  document.getElementById('cancelBtn').style.display = 'inline-block';
  updateImagePreview();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  editingId = null;
  pendingImage = '';
  document.getElementById('nameInput').value = '';
  document.getElementById('categorySelect').value = categories[0].key;
  document.getElementById('descInput').value = '';
  document.getElementById('saveBtn').textContent = '添加菜品';
  document.getElementById('cancelBtn').style.display = 'none';
  updateImagePreview();
}

function updateImagePreview() {
  const img = document.getElementById('imagePreview');
  const placeholder = document.getElementById('imagePlaceholder');
  if (pendingImage) {
    img.src = pendingImage;
    img.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    img.style.display = 'none';
    placeholder.style.display = 'flex';
  }
}

document.getElementById('chooseImageBtn').addEventListener('click', () => {
  document.getElementById('imageInput').click();
});

document.getElementById('imageInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('image', file);
  document.getElementById('chooseImageBtn').textContent = '上传中...';
  try {
    const res = await fetch('/api/dishes/upload-image', { method: 'POST', body: formData });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    pendingImage = data.image;
    updateImagePreview();
  } catch (err) {
    alert('上传失败');
  } finally {
    document.getElementById('chooseImageBtn').textContent = '选择照片';
  }
});

document.getElementById('cancelBtn').addEventListener('click', resetForm);

document.getElementById('saveBtn').addEventListener('click', async () => {
  const name = document.getElementById('nameInput').value.trim();
  const category = document.getElementById('categorySelect').value;
  const desc = document.getElementById('descInput').value.trim();
  if (!name) {
    alert('请输入菜名');
    return;
  }
  const res = await fetch('/api/dishes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: editingId, name, category, desc, image: pendingImage })
  });
  const data = await res.json();
  if (!data.success) {
    alert(data.error || '保存失败');
    return;
  }
  resetForm();
  load();
});

async function removeDish(id) {
  if (!confirm('确定下架这道菜吗？')) return;
  await fetch(`/api/dishes/${id}`, { method: 'DELETE' });
  load();
}

async function seed() {
  await fetch('/api/dishes/seed', { method: 'POST' });
  load();
}

(async function init() {
  await loadCategories();
  resetForm();
  load();
})();
</script>
</body>
</html>
